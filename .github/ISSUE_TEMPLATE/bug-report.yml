name: Bug report
description: Report a reproducible problem in Calc123
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Use synthetic calculator data. Do not include passwords, private URLs, customer data, database exports or complete production logs.

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: "1.3"
    validations:
      required: true

  - type: input
    id: wordpress-version
    attributes:
      label: WordPress version
      placeholder: "7.0"
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: "8.4"
    validations:
      required: true

  - type: textarea
    id: calculator
    attributes:
      label: Calculator configuration
      description: Provide a minimal formula, variable definitions and shortcode using synthetic values.
      placeholder: |
        Formula: price * quantity
        Variables:
        - price, number
        - quantity, number
        Shortcode: [calc123 id="1"]
    validations:
      required: true

  - type: dropdown
    id: affected-area
    attributes:
      label: Affected area
      options:
        - Admin create or edit form
        - Formula validation or calculation
        - AJAX request
        - Frontend shortcode output
        - Captcha
        - Styling or responsive layout
        - Other or not sure
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Create a calculator with the configuration above.
        2. Add the shortcode to a page.
        3. Enter the following values...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Relevant diagnostics
      description: Remove credentials, private data and unrelated log entries.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Preliminary checks
      options:
        - label: I checked the current documentation and existing issues.
          required: true
        - label: I reproduced the problem with synthetic or non-sensitive data.
          required: true
        - label: I removed credentials and private data from this report.
          required: true
